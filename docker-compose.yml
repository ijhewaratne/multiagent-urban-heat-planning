version: "3.8"

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
      
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - BRANITZ_DATA_ROOT=/data
    volumes:
      - ./data:/data
    depends_on:
      - redis
      
  celery_worker:
    build: .
    command: celery -A src.branitz_heat_decision.api.tasks worker --loglevel=info
    environment:
      - BRANITZ_DATA_ROOT=/data
      - CELERY_BROKER_URL=redis://redis:6379/0
    volumes:
      - ./data:/data
    depends_on:
      - redis
      - api
