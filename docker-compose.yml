version: '3.8'

services:
  api:
    build:
      context: .
      target: development
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/data
      - ./output:/output
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_ROOT=/data
      - OUTPUT_ROOT=/output
      - PYTHONPATH=/app/src
    depends_on:
      - redis
      - worker

  worker:
    build:
      context: .
      target: development
    command: celery -A branitz_heat_decision.api.tasks worker --loglevel=info --concurrency=2
    volumes:
      - .:/app
      - ./data:/data
      - ./output:/output
    environment:
      - REDIS_URL=redis://redis:6379
      - PYTHONPATH=/app/src
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  flower:
    image: mher/flower:2.0
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  redis_data:
