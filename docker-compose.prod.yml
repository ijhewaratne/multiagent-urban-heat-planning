version: '3.8'

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./output:/var/www/output:ro
    depends_on:
      - api
    restart: always

  api:
    build:
      context: .
      target: production
    expose:
      - "8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_ROOT=/data
      - OUTPUT_ROOT=/output
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-https://*.fraunhofer.de}
      - PYTHONPATH=/app/src
    volumes:
      - ./data:/data:ro
      - ./output:/output
      - ./src/branitz_heat_decision/config:/app/src/branitz_heat_decision/config:ro
    depends_on:
      - redis
    restart: always
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  worker:
    build:
      context: .
      target: production
    command: celery -A branitz_heat_decision.api.tasks worker --loglevel=warning --concurrency=4 --max-tasks-per-child=10
    environment:
      - REDIS_URL=redis://redis:6379
      - DATA_ROOT=/data
      - OUTPUT_ROOT=/output
      - PYTHONPATH=/app/src
    volumes:
      - ./data:/data:ro
      - ./output:/output
    depends_on:
      - redis
    restart: always
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    restart: always

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    expose:
      - "9090"
    restart: always

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    expose:
      - "3000"
    restart: always

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
